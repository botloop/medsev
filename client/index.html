<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCG MEDS-EV System</title>

    <!-- ── Open Graph / Link Preview ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="PCG MEDS-EV System" />
    <meta property="og:title"       content="PCG Medical Service Eastern Visayas System" />
    <meta property="og:description" content="Philippine Coast Guard — Medical Service Eastern Visayas (MEDS-EV) personnel and medical evaluation management system." />
    <meta property="og:image"       content="https://personnel-management-sys-b9278.web.app/logo.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url"         content="https://personnel-management-sys-b9278.web.app" />
    <!-- Twitter card fallback -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="PCG MEDS-EV System" />
    <meta name="twitter:description" content="Philippine Coast Guard Medical Service Eastern Visayas personnel and medical evaluation system." />
    <meta name="twitter:image"       content="https://personnel-management-sys-b9278.web.app/logo.png" />

    <script>
      // Detect Facebook / Messenger in-app browser and redirect to external browser
      (function () {
        var ua = navigator.userAgent || '';
        var isFacebookIAB = /FBAN|FBAV|FB_IAB|Instagram|LinkedInApp/.test(ua);
        if (!isFacebookIAB) return;

        var url = window.location.href;

        // Android: use intent:// scheme to force Chrome
        if (/Android/i.test(ua)) {
          var intentUrl = 'intent://' + url.replace(/^https?:\/\//, '') +
            '#Intent;scheme=https;package=com.android.chrome;end';
          window.location.replace(intentUrl);
          return;
        }

        // iOS: can't force redirect — show fullscreen overlay styled like the app's loading screen
        document.addEventListener('DOMContentLoaded', function () {
          var style = document.createElement('style');
          style.textContent = [
            '@keyframes iab-spin{to{transform:rotate(360deg)}}',
            '@keyframes iab-dot{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-10px);opacity:1}}',
            '@keyframes iab-fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}',
          ].join('');
          document.head.appendChild(style);

          var overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;margin:0;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 55%,#1d4ed8 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:sans-serif;box-sizing:border-box';

          overlay.innerHTML = [
            // Spinner with anchor
            '<div style="position:relative;width:88px;height:88px;margin:0 auto 28px;animation:iab-fade 0.6s ease-out">',
              '<div style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(255,255,255,0.1)"></div>',
              '<div style="position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#60a5fa;border-right-color:#93c5fd;animation:iab-spin 1s linear infinite"></div>',
              '<div style="position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(255,255,255,0.08)"></div>',
              '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px">⚓</div>',
            '</div>',
            // Title
            '<div style="color:white;animation:iab-fade 0.6s ease-out;margin-bottom:32px">',
              '<div style="font-size:10px;letter-spacing:5px;font-weight:700;color:#93c5fd;text-transform:uppercase;margin-bottom:8px">Philippine Coast Guard</div>',
              '<div style="font-size:22px;font-weight:800;letter-spacing:1.5px;color:#fff;margin-bottom:4px">MEDS-EV System</div>',
              '<div style="font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:0.5px">Medical Service Eastern Visayas</div>',
            '</div>',
            // Instruction card
            '<div style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:20px;width:100%;max-width:320px;margin-bottom:20px;box-sizing:border-box">',
              '<div style="color:#94a3b8;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Open in browser</div>',
              '<div style="color:#f8fafc;font-size:15px;font-weight:600;margin-bottom:6px">Tap &nbsp;<strong style="color:#60a5fa">⋯</strong>&nbsp; then select</div>',
              '<div style="color:#60a5fa;font-size:18px;font-weight:700">"Open in Browser"</div>',
            '</div>',
            // URL copy
            '<div style="color:#475569;font-size:11px;margin-bottom:8px">or copy and paste in Chrome / Safari</div>',
            '<div style="background:rgba(30,58,95,0.7);border:1px solid #1d4ed8;border-radius:8px;padding:10px 14px;color:#93c5fd;font-size:10px;word-break:break-all;max-width:320px;box-sizing:border-box">',
              url,
            '</div>',
            // Bouncing dots
            '<div style="display:flex;gap:7px;justify-content:center;margin-top:28px">',
              '<div style="width:8px;height:8px;border-radius:50%;background:#60a5fa;animation:iab-dot 1.3s ease-in-out 0s infinite"></div>',
              '<div style="width:8px;height:8px;border-radius:50%;background:#60a5fa;animation:iab-dot 1.3s ease-in-out 0.18s infinite"></div>',
              '<div style="width:8px;height:8px;border-radius:50%;background:#60a5fa;animation:iab-dot 1.3s ease-in-out 0.36s infinite"></div>',
            '</div>',
          ].join('');

          document.body.innerHTML = '';
          document.body.style.margin = '0';
          document.body.appendChild(overlay);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
